# Start the Python GA API in a container (port 8000).
#   docker compose up --build
#   docker compose down
# Docs: https://docs.docker.com/compose/

services:
  ga-api:
    build: .
    image: ece470-ga-api:latest
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DATA_DIR: "/app/public/data"
